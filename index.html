// ── Calculadora ───────────────────────────────────────────────────────────────
function Calculadora({onReservar, isLoggedIn=false}){
  const [origen,setOrigen]=useState("");
  const [destino,setDestino]=useState("");

                <span style={{fontSize:"1.2rem"}}>✈</span>
                <div style={{flex:1,height:2,background:"linear-gradient(90deg,#E8C4A0,#B8845A)"}}/>
              </div>
              {tipoViaje==="idavuelta"&&<p style={{fontSize:"0.7rem",color:"#B8845A",marginTop:4,fontWeight:500}}>↩ regreso incluido</p>}
            </div>
            <div style={{textAlign:"center",flex:1}}>
              <span style={{fontSize:"2rem"}}>{LUGAR_META[destino].icon}</span>

          <div style={{textAlign:"center",marginBottom:24}}>

              {tipoViaje==="idavuelta" ? fmtPrice(totalIdaVuelta) : fmtPrice(isLoggedIn?disc10(precio):precio)}
            </p>
            {tipoViaje==="idavuelta"&&(
              <div style={{marginTop:10,fontSize:"0.8rem",color:"#6B6B6B"}}>
                <span>Ida {fmtPrice(precio)}</span>
                <span style={{margin:"0 8px",color:"#B8845A"}}>+</span>
                <span>Regreso {fmtPrice(precioVueltaDisc)} </span>

// ── Auth ──────────────────────────────────────────────────────────────────────
function Auth({onLogin,onBack,onGuest}){
  const [tab,setTab]=useState("login");
  const [form,setForm]=useState({name:"",email:"",phone:"",password:""});
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  async function submit(){
    if(!form.email||!form.password){setErr("Completa todos los campos.");return;}
    if(tab==="register"&&!form.name){setErr("Ingresa tu nombre.");return;}
    setLoading(true);
    setErr("");
    try {
      if(form.email==="admin@despego.co"){onLogin(null,true);return;}
      if(tab==="register"){
        const {data,error} = await supabase.auth.signUp({
          email:form.email, password:form.password,
          options:{data:{name:form.name, phone:form.phone}}
        });
        if(error) throw error;
        const u={id:data.user.id, name:form.name, email:form.email, phone:form.phone, trips:0};
        onLogin(u,false);
      } else {
        const {data,error} = await supabase.auth.signInWithPassword({
          email:form.email, password:form.password
        });
        if(error) throw error;
        // Get profile
        const {data:profile} = await supabase.from('profiles').select('*').eq('id',data.user.id).single();
        const u={id:data.user.id, name:profile?.name||form.email, email:form.email, phone:profile?.phone||"", trips:profile?.trips_completed||0};
        onLogin(u,false);
      }
    } catch(e) {
      setErr(e.message||"Error al iniciar sesión");
    } finally {
      setLoading(false);
    }
  }

  const inp=(ph,f,t="text")=>(
    <input type={t} placeholder={ph} value={form[f]} onChange={e=>setForm(x=>({...x,[f]:e.target.value}))}
      style={{width:"100%",padding:"13px 16px",borderRadius:12,border:"1.5px solid rgba(0,0,0,0.1)",fontSize:"0.95rem",marginBottom:10,background:"white"}}/>
  );

  return(
    <div style={{minHeight:"100vh",background:"#FAFAF8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <button onClick={onBack} style={{position:"fixed",top:20,left:20,color:"#6B6B6B",fontSize:"0.85rem"}}>← Volver</button>
      <div style={{width:"100%",maxWidth:380}}>
        <h1 style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:"2rem",textAlign:"center",marginBottom:4}}>Despego<span style={{color:"#B8845A"}}>.</span></h1>
        <p style={{textAlign:"center",color:"#6B6B6B",fontWeight:300,fontSize:"0.9rem",marginBottom:8}}>Tu transfer al aeropuerto</p>
        {tab==="register"&&(
          <div style={{background:"#D1FAE5",borderRadius:12,padding:"10px 16px",marginBottom:16,textAlign:"center"}}>
            <p style={{fontSize:"0.82rem",color:"#065F46",fontWeight:500}}>🎁 Al registrarte obtienes 10% de descuento en tu primer viaje</p>
          </div>
        )}
        <div style={{display:"flex",background:"#F0EDE8",borderRadius:12,padding:4,marginBottom:20}}>
          {["login","register"].map(t=>(
            <button key={t} onClick={()=>setTab(t)}
              style={{flex:1,padding:"10px",borderRadius:9,background:tab===t?"white":"transparent",fontSize:"0.875rem",fontWeight:tab===t?500:400,color:tab===t?"#0C0C0C":"#6B6B6B",transition:"all 0.2s"}}>
              {t==="login"?"Iniciar sesión":"Crear cuenta"}
            </button>
          ))}
        </div>
        <div style={{background:"white",borderRadius:20,padding:24,boxShadow:"0 2px 20px rgba(0,0,0,0.07)"}}>
          {tab==="register"&&inp("Nombre completo","name")}
          {inp("Correo electrónico","email","email")}
          {tab==="register"&&inp("Teléfono WhatsApp","phone","tel")}
          {inp("Contraseña","password","password")}
          {err&&<p style={{color:"#DC2626",fontSize:"0.82rem",marginBottom:10}}>{err}</p>}
          <button onClick={submit} disabled={loading}
            style={{width:"100%",background:"#0C0C0C",color:"white",padding:"15px",borderRadius:12,fontSize:"0.95rem",fontWeight:500,marginBottom:12,opacity:loading?0.7:1}}>
            {loading?"Cargando...":(tab==="login"?"Entrar":"Crear cuenta y obtener 10% off")}
          </button>
          <div style={{textAlign:"center",color:"#6B6B6B",fontSize:"0.82rem",marginBottom:12}}>— o —</div>
          <button onClick={onGuest}
            style={{width:"100%",background:"transparent",border:"1.5px solid rgba(0,0,0,0.12)",color:"#0C0C0C",padding:"14px",borderRadius:12,fontSize:"0.9rem"}}>
            Reservar sin crear cuenta
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Métodos de pago ────────────────────────────────────────────────────────────
function PagoSelector({selected, onChange}){
  const metodos = [
    {id:"bold_directo", icon:"💳", label:"Tarjeta (Bold)", sub:"Pago seguro en línea"},
    {id:"bold_link",    icon:"🔗", label:"Link Bold",     sub:"Te lo enviamos por WhatsApp"},
    {id:"nequi",        icon:"📱", label:"Nequi",         sub:`Nro. ${NEQUI}`},
    {id:"daviplata",    icon:"💜", label:"Daviplata",     sub:`Nro. ${DAVIPLATA}`},
    {id:"efectivo",     icon:"💵", label:"Efectivo",      sub:"Al momento del viaje"},
  ];
  return(
    <div>
      <label style={{display:"block",fontSize:"0.7rem",fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",color:"#6B6B6B",marginBottom:10}}>Método de pago *</label>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {metodos.map(m=>(
          <button key={m.id} onClick={()=>onChange(m.id)}
            style={{padding:"12px",borderRadius:12,border:`2px solid ${selected===m.id?"#B8845A":"rgba(0,0,0,0.08)"}`,background:selected===m.id?"#FDF5EE":"white",textAlign:"left",cursor:"pointer",transition:"all 0.15s"}}>
            <span style={{fontSize:"1.2rem"}}>{m.icon}</span>
            <p style={{fontSize:"0.82rem",fontWeight:600,marginTop:4,color:selected===m.id?"#B8845A":"#0C0C0C"}}>{m.label}</p>

          </button>
        ))}
      </div>
    </div>
  );
}

// ── Formulario reserva ─────────────────────────────────────────────────────────
function ReservaForm({user,prefill,onSubmit,onBack}){
  const [form,setForm]=useState({
    name:user?.name||"", phone:user?.phone||"",
    origin:prefill?.origen||"", destination:prefill?.destino||"",
    date:"", time:"", flightNumber:"", notes:"",
    reciboVia:"whatsapp", pagoMetodo:"", tipoViaje:prefill?.tipoViaje||"ida",
  });
  const [sent,setSent]=useState(false);
  const [errors,setErrors]=useState({});
  const [loading,setLoading]=useState(false);

  const needsFlight = f=>f.origin==="aeropuerto"||f.destination==="aeropuerto";
  const precio = prefill?.precio || (form.origin&&form.destination ? TARIFAS[form.origin]?.[form.destination] : null);
  const dests = form.origin ? DESTINOS[form.origin] : [];

  function changeOrigen(v){setForm(f=>({...f,origin:v,destination:""}));}

  function validate(){
    const e={};
    if(!form.name.trim()) e.name="Ingresa tu nombre";
    if(!form.phone.trim()||form.phone.length<7) e.phone="Teléfono inválido";
    if(!form.origin) e.origin="Selecciona origen";
    if(!form.destination) e.destination="Selecciona destino";
    if(!form.date) e.date="Selecciona fecha";
    if(!form.time) e.time="Selecciona hora";
    if(!form.pagoMetodo) e.pagoMetodo="Selecciona método de pago";
    return e;
  }

  async function handleSubmit(){
    const e=validate();
    if(Object.keys(e).length){setErrors(e);return;}
    setLoading(true);
    try {
      const reservaData = {
        user_id: user?.id || null,
        name: form.name,
        phone: form.phone,
        origin: form.origin,
        destination: form.destination,
        date: form.date,
        time: form.time,
        flight_number: form.flightNumber || null,
        notes: form.notes || null,
        tipo_viaje: form.tipoViaje,
        price: precio,
        pago_metodo: form.pagoMetodo,
        recibo_via: form.reciboVia,
        status: 'pending'
      };
      const {data,error} = await supabase.from('reservas').insert([reservaData]).select().single();
      if(error) throw error;
      onSubmit({...form, price:precio, status:"pending", userId:user?.id||null, id:data.id, createdAt:data.created_at});
      setSent(true);
    } catch(e) {
      alert("Error al guardar la reserva: " + e.message);
    } finally {
      setLoading(false);
    }
  }

  const inp=(label,field,type="text",ph="",required=false)=>(
    <div style={{marginBottom:14}}>
      <label style={{display:"block",fontSize:"0.7rem",fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",color:errors[field]?"#DC2626":"#6B6B6B",marginBottom:6}}>{label}{required&&" *"}</label>
      <input type={type} placeholder={ph} value={form[field]} min={type==="date"?todayStr():undefined}
        onChange={e=>setForm(f=>({...f,[field]:e.target.value}))}
        style={{width:"100%",padding:"13px 16px",borderRadius:12,border:`1.5px solid ${errors[field]?"#DC2626":"rgba(0,0,0,0.1)"}`,fontSize:"0.95rem",background:"white"}}/>
      {errors[field]&&<p style={{color:"#DC2626",fontSize:"0.75rem",marginTop:4}}>{errors[field]}</p>}
    </div>
  );

  const sel=(label,field,opts,ph,onChange)=>(
    <div style={{marginBottom:14}}>
      <label style={{display:"block",fontSize:"0.7rem",fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",color:errors[field]?"#DC2626":"#6B6B6B",marginBottom:6}}>{label} *</label>
      <div style={{position:"relative"}}>
        <select value={form[field]} onChange={e=>(onChange||(v=>setForm(f=>({...f,[field]:v}))))(e.target.value)}
          style={{width:"100%",padding:"13px 40px 13px 16px",borderRadius:12,border:`1.5px solid ${errors[field]?"#DC2626":"rgba(0,0,0,0.1)"}`,fontSize:"0.95rem",background:"white",color:form[field]?"#0C0C0C":"#999",appearance:"none"}}>
          <option value="">{ph}</option>
          {opts.map(([k,v])=><option key={k} value={k}>{v}</option>)}
        </select>
        <span style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",color:"#999",pointerEvents:"none",fontSize:"0.65rem"}}>▼</span>
      </div>
    </div>
  );

  if(sent) return(
    <div style={{minHeight:"100vh",background:"#FAFAF8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,textAlign:"center"}}>
      <div style={{fontSize:"3.5rem",marginBottom:20}}>✅</div>
      <h2 style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:"2rem",marginBottom:12}}>¡Reserva recibida!</h2>
      <p style={{color:"#6B6B6B",fontWeight:300,maxWidth:340,lineHeight:1.75,marginBottom:12}}>
        Tu solicitud está <strong>pendiente de confirmación</strong>. Te contactaremos por {form.reciboVia==="whatsapp"?"WhatsApp":form.reciboVia==="email"?"correo":"WhatsApp y correo"} al confirmar.
      </p>
      {form.pagoMetodo==="nequi"&&<div style={{background:"#EDE9FE",borderRadius:14,padding:"14px 20px",marginBottom:16,maxWidth:320}}><p style={{fontSize:"0.85rem",color:"#5B21B6"}}>📱 Para pagar por Nequi transfiere a: <strong>{NEQUI}</strong></p></div>}
      {form.pagoMetodo==="daviplata"&&<div style={{background:"#EDE9FE",borderRadius:14,padding:"14px 20px",marginBottom:16,maxWidth:320}}><p style={{fontSize:"0.85rem",color:"#5B21B6"}}>💜 Para pagar por Daviplata transfiere a: <strong>{DAVIPLATA}</strong></p></div>}
      <p style={{color:"#aaa",fontSize:"0.85rem",fontWeight:300,marginBottom:32}}>📍 Te pediremos la dirección exacta de recogida por WhatsApp.</p>
      <button onClick={onBack} style={{background:"#0C0C0C",color:"white",padding:"14px 28px",borderRadius:100,fontSize:"0.9rem",fontWeight:500}}>
        {user?"Ver mis reservas":"Volver al inicio"}
      </button>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#FAFAF8"}}>
      <div style={{maxWidth:480,margin:"0 auto",padding:"28px 20px 80px"}}>
        <button onClick={onBack} style={{color:"#6B6B6B",fontSize:"0.85rem",marginBottom:24}}>← Volver</button>
        <h1 style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:"2rem",letterSpacing:"-0.02em",marginBottom:4}}>Nueva reserva</h1>
        <p style={{color:"#6B6B6B",fontWeight:300,fontSize:"0.9rem",marginBottom:24}}>Completa los datos y te confirmamos por WhatsApp.</p>

        <div style={{background:"white",borderRadius:20,padding:22,boxShadow:"0 2px 16px rgba(0,0,0,0.06)",marginBottom:14}}>
          <p style={{fontSize:"0.7rem",fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",color:"#6B6B6B",marginBottom:14}}>Tus datos</p>
          {inp("Nombre","name","text","Tu nombre completo",true)}
          {inp("Teléfono WhatsApp","phone","tel","3001234567",true)}
        </div>

        <div style={{background:"white",borderRadius:20,padding:22,boxShadow:"0 2px 16px rgba(0,0,0,0.06)",marginBottom:14}}>
          <p style={{fontSize:"0.7rem",fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",color:"#6B6B6B",marginBottom:14}}>El viaje</p>
          {sel("Origen","origin",Object.entries(LUGARES),"¿Desde dónde?",changeOrigen)}
          {sel("Destino","destination",dests.map(k=>[k,LUGARES[k]]),form.origin?"¿A dónde?":"Selecciona origen primero")}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {inp("Fecha","date","date","",true)}
            {inp("Hora de recogida","time","time","",true)}
          </div>
          {needsFlight(form)&&inp("Número de vuelo","flightNumber","text","Ej: AV204")}
          {needsFlight(form)&&<p style={{fontSize:"0.78rem",color:"#B8845A",marginBottom:14,lineHeight:1.6}}>✈ Con tu número de vuelo monitoreamos llegadas y salidas.</p>}
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:"0.7rem",fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",color:"#6B6B6B",marginBottom:6}}>Notas (opcional)</label>
            <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
              placeholder="Ej: tengo maleta grande, voy con mascota..."
              style={{width:"100%",padding:"13px 16px",borderRadius:12,border:"1.5px solid rgba(0,0,0,0.1)",fontSize:"0.9rem",resize:"vertical",minHeight:72}}/>
          </div>
        </div>

        {/* Pago */}
        <div style={{background:"white",borderRadius:20,padding:22,boxShadow:"0 2px 16px rgba(0,0,0,0.06)",marginBottom:14}}>
          <p style={{fontSize:"0.7rem",fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",color:"#6B6B6B",marginBottom:14}}>Método de pago</p>
          <PagoSelector selected={form.pagoMetodo} onChange={v=>setForm(f=>({...f,pagoMetodo:v}))}/>
          {errors.pagoMetodo&&<p style={{color:"#DC2626",fontSize:"0.75rem",marginTop:8}}>{errors.pagoMetodo}</p>}
        </div>

        {/* Recibo */}
        <div style={{background:"white",borderRadius:20,padding:22,boxShadow:"0 2px 16px rgba(0,0,0,0.06)",marginBottom:14}}>
          <p style={{fontSize:"0.7rem",fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",color:"#6B6B6B",marginBottom:14}}>¿Cómo recibes tu recibo?</p>
          <div style={{display:"flex",gap:8}}>
            {[["whatsapp","📱 WhatsApp"],["email","📧 Correo"],["ambos","📱+📧 Los dos"]].map(([v,l])=>(
              <button key={v} onClick={()=>setForm(f=>({...f,reciboVia:v}))}
                style={{flex:1,padding:"11px 8px",borderRadius:12,border:`2px solid ${form.reciboVia===v?"#B8845A":"rgba(0,0,0,0.08)"}`,background:form.reciboVia===v?"#FDF5EE":"white",fontSize:"0.78rem",fontWeight:form.reciboVia===v?600:400,color:form.reciboVia===v?"#B8845A":"#6B6B6B",cursor:"pointer"}}>
                {l}
              </button>
            ))}
          </div>
        </div>

        {/* Nota dirección */}
        <div style={{background:"#FEF3C7",borderRadius:14,padding:"14px 18px",marginBottom:14,display:"flex",gap:10,alignItems:"flex-start"}}>
          <span style={{fontSize:"1rem"}}>📍</span>
          <p style={{fontSize:"0.82rem",color:"#92400E",lineHeight:1.6}}>Una vez confirmada tu reserva, te pediremos la <strong>dirección exacta</strong> por WhatsApp.</p>
        </div>

        {/* Precio */}
        {precio&&(
          <div style={{background:"#0C0C0C",borderRadius:18,padding:"18px 22px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={{fontSize:"0.68rem",color:"rgba(255,255,255,0.4)",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>
                {prefill?.tipoViaje==="idavuelta"?"Total ida y vuelta":"Tu tarifa fija"}
              </p>
              <p style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:"2rem",color:"white",letterSpacing:"-0.02em"}}>{fmtPrice(precio)}</p>
            </div>
            <span style={{fontSize:"1.8rem"}}>✈</span>
          </div>
        )}

        <button onClick={handleSubmit} disabled={!precio||loading}
          style={{width:"100%",background:precio?"#B8845A":"#ddd",color:precio?"white":"#999",padding:"16px",borderRadius:14,fontSize:"0.95rem",fontWeight:500,cursor:precio?"pointer":"not-allowed",opacity:loading?0.7:1}}>
          {loading?"Guardando reserva...":"Enviar solicitud de reserva"}
        </button>
        <p style={{textAlign:"center",fontSize:"0.78rem",color:"#aaa",marginTop:10}}>No se cobra hasta confirmar.</p>
        <p style={{textAlign:"center",fontSize:"0.75rem",color:"#B8845A",marginTop:6}}>¿Necesitas cancelar? Escríbenos con anticipación y lo resolvemos — siempre.</p>
      </div>
    </div>
  );
}

      <div style={{background:"white",borderRadius:20,padding:32,maxWidth:400,width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
        {/* Header recibo */}
        <div style={{textAlign:"center",marginBottom:24,paddingBottom:20,borderBottom:"2px dashed rgba(0,0,0,0.1)"}}>

          <p style={{fontSize:"0.75rem",color:"#6B6B6B",marginTop:4}}>Transfer premium al aeropuerto</p>
          <p style={{fontSize:"0.72rem",color:"#aaa",marginTop:2}}>{EMAIL}</p>

        {/* Número y fecha */}
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:20,fontSize:"0.82rem"}}>
          <div><p style={{color:"#6B6B6B"}}>Recibo</p><p style={{fontWeight:600}}>{num}</p></div>
          <div style={{textAlign:"right"}}><p style={{color:"#6B6B6B"}}>Fecha</p><p style={{fontWeight:600}}>{new Date().toLocaleDateString("es-CO")}</p></div>
        </div>

        {/* Cliente */}
        <div style={{background:"#F8F6F2",borderRadius:12,padding:"16px",marginBottom:16}}>
          <p style={{fontSize:"0.7rem",fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",color:"#6B6B6B",marginBottom:8}}>Cliente</p>

          <p style={{fontSize:"0.85rem",color:"#6B6B6B",marginTop:4}}>📅 {fmtDate(reserva.date)} · {reserva.time}h</p>
          {reserva.flightNumber&&<p style={{fontSize:"0.85rem",color:"#B8845A",marginTop:4}}>✈ Vuelo {reserva.flightNumber}</p>}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 0",borderTop:"2px dashed rgba(0,0,0,0.1)",marginBottom:20}}>
          <p style={{fontWeight:600}}>Total</p>
          <p style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:"1.8rem",letterSpacing:"-0.02em"}}>{fmtPrice(reserva.price)}</p>
        </div>

        <p style={{textAlign:"center",fontSize:"0.75rem",color:"#aaa",marginBottom:20}}>Gracias por viajar con Despego · despego.co</p>

        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>window.print()}

        </div>
      </div>
    </div>
  );

// ── Dashboard cliente ──────────────────────────────────────────────────────────
function Dashboard({user,reservas,onNuevaReserva,onLogout}){
  const mias = reservas.filter(r=>r.userId===user.id).sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  const trips = mias.filter(r=>r.status==="confirmed").length;
  const nextCashback = 10 - (trips % 10);

  return(
    <div style={{minHeight:"100vh",background:"#FAFAF8"}}>
      <div style={{background:"#0C0C0C",color:"white",padding:"24px 24px 32px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <span style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:"1.4rem"}}>Despego<span style={{color:"#B8845A"}}>.</span></span>
          <button onClick={onLogout} style={{border:"1px solid rgba(255,255,255,0.2)",color:"rgba(255,255,255,0.7)",padding:"7px 14px",borderRadius:100,fontSize:"0.78rem"}}>Salir</button>
        </div>
        <p style={{fontSize:"0.78rem",color:"rgba(255,255,255,0.45)",marginBottom:4}}>Bienvenido</p>
        <h1 style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:"1.8rem",marginBottom:16}}>{user.name}</h1>
        {/* Progreso cashback */}
        <div style={{background:"rgba(255,255,255,0.07)",borderRadius:14,padding:"14px 18px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <p style={{fontSize:"0.8rem",color:"rgba(255,255,255,0.6)"}}>Progreso Club Despego</p>
            <p style={{fontSize:"0.8rem",color:"#B8845A",fontWeight:500}}>{trips} viajes</p>
          </div>
          <div style={{background:"rgba(255,255,255,0.1)",borderRadius:100,height:6,overflow:"hidden"}}>
            <div style={{width:`${(trips%10)*10}%`,height:"100%",background:"#B8845A",borderRadius:100,transition:"width 0.5s"}}/>
          </div>
          <p style={{fontSize:"0.75rem",color:"rgba(255,255,255,0.4)",marginTop:6}}>
            {nextCashback === 10 ? "🎉 ¡Cashback disponible!" : `${nextCashback} viaje${nextCashback!==1?"s":""} para tu próximo cashback 20%`}
          </p>
        </div>
      </div>
      <div style={{maxWidth:520,margin:"0 auto",padding:"24px 20px"}}>
        <button onClick={onNuevaReserva}
          style={{width:"100%",background:"#B8845A",color:"white",padding:"16px",borderRadius:14,fontSize:"1rem",fontWeight:500,marginBottom:28,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          ✈ Nueva reserva
        </button>
        <h2 style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:"1.4rem",marginBottom:16}}>Mis viajes</h2>
        {mias.length===0?(

          <div key={r.id} style={{background:"white",borderRadius:16,padding:20,boxShadow:"0 1px 12px rgba(0,0,0,0.06)",marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <div>
                <p style={{fontWeight:500}}>{LUGARES[r.origin]} → {LUGARES[r.destination]}</p>
                <p style={{fontSize:"0.85rem",color:"#6B6B6B",marginTop:2}}>{fmtDate(r.date)} · {r.time}h</p>
              </div>
              <Badge status={r.status}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"1px solid rgba(0,0,0,0.06)",paddingTop:10}}>

// ── Admin ─────────────────────────────────────────────────────────────────────
function Admin({reservas,onUpdate,onLogout,onLanding}){
  const [filtro,setFiltro]=useState("all");
  const [reciboActivo,setReciboActivo]=useState(null);
  const lista=reservas.filter(r=>filtro==="all"||r.status===filtro).sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  const cnt={pending:reservas.filter(r=>r.status==="pending").length,confirmed:reservas.filter(r=>r.status==="confirmed").length,total:reservas.length};

  const waConfirm=r=>{
    let msg=`Hola ${r.name.split(" ")[0]} 👋, tu transfer con Despego está *confirmado* ✅\n\n📍 ${LUGARES[r.origin]} → ${LUGARES[r.destination]}\n📅 ${fmtDate(r.date)} a las ${r.time}h\n💰 ${fmtPrice(r.price)}`;
    if(r.pagoMetodo==="nequi") msg+=`\n\n📱 Para pagar por Nequi: *${NEQUI}*`;
    if(r.pagoMetodo==="daviplata") msg+=`\n\n💜 Para pagar por Daviplata: *${DAVIPLATA}*`;
    if(r.pagoMetodo==="bold_link") msg+=`\n\n💳 En breve te enviamos el link de pago Bold.`;
    msg+=`\n\n¿Nos confirmas la dirección exacta de recogida? 🙏`;
    return `https://wa.me/57${r.phone.replace(/\D/g,"")}?text=${encodeURIComponent(msg)}`;
  };
  const waReject=r=>{
    const msg=`Hola ${r.name.split(" ")[0]}, lamentablemente ese horario no está disponible. ¿Podemos revisar otra fecha?`;
    return `https://wa.me/57${r.phone.replace(/\D/g,"")}?text=${encodeURIComponent(msg)}`;
  };

  return(
    <div style={{minHeight:"100vh",background:"#FAFAF8"}}>
      {reciboActivo&&<Recibo reserva={reciboActivo} onClose={()=>setReciboActivo(null)}/>}
      <div style={{background:"#0C0C0C",color:"white",padding:"22px 20px 28px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <span style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:"1.3rem"}}>Despego<span style={{color:"#B8845A"}}>.</span> <span style={{fontSize:"0.75rem",color:"rgba(255,255,255,0.35)",fontFamily:"DM Sans,sans-serif"}}>Admin</span></span>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onLanding} style={{border:"1px solid rgba(255,255,255,0.15)",color:"rgba(255,255,255,0.6)",padding:"6px 12px",borderRadius:100,fontSize:"0.75rem"}}>Ver web</button>
            <button onClick={onLogout} style={{border:"1px solid rgba(255,255,255,0.15)",color:"rgba(255,255,255,0.6)",padding:"6px 12px",borderRadius:100,fontSize:"0.75rem"}}>Salir</button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {[["⏳",cnt.pending,"Pendientes"],["✅",cnt.confirmed,"Confirmados"],["📋",cnt.total,"Total"]].map(([ic,n,l])=>(
            <div key={l} style={{background:"rgba(255,255,255,0.07)",borderRadius:12,padding:"14px",textAlign:"center"}}>
              <p style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:"1.8rem",lineHeight:1}}>{n}</p>
              <p style={{fontSize:"0.7rem",color:"rgba(255,255,255,0.4)",marginTop:4}}>{l}</p>
            </div>
          ))}
        </div>
      </div>

      <div style={{maxWidth:580,margin:"0 auto",padding:"18px 18px 80px"}}>
        <div style={{display:"flex",gap:8,marginBottom:18,overflowX:"auto",paddingBottom:4}}>
          {[["all","Todas"],["pending","Pendientes"],["confirmed","Confirmadas"],["rejected","Rechazadas"]].map(([k,v])=>(
            <button key={k} onClick={()=>setFiltro(k)}
              style={{padding:"8px 16px",borderRadius:100,border:"1.5px solid",borderColor:filtro===k?"#0C0C0C":"rgba(0,0,0,0.1)",background:filtro===k?"#0C0C0C":"transparent",color:filtro===k?"white":"#6B6B6B",fontSize:"0.82rem",whiteSpace:"nowrap",fontWeight:filtro===k?500:400}}>
              {v}
            </button>
          ))}
        </div>

        {lista.length===0&&<p style={{textAlign:"center",color:"#6B6B6B",padding:"40px 0",fontWeight:300}}>Sin reservas.</p>}

        {lista.map(r=>(
          <div key={r.id} style={{background:"white",borderRadius:16,padding:20,boxShadow:"0 1px 12px rgba(0,0,0,0.06)",marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
              <div>
                <p style={{fontWeight:500,fontSize:"1rem"}}>{r.name}</p>
                <p style={{fontSize:"0.82rem",color:"#6B6B6B"}}>📱 {r.phone}</p>
              </div>
              <Badge status={r.status}/>
            </div>
            <div style={{background:"#F8F6F2",borderRadius:10,padding:"12px 14px",marginBottom:12,fontSize:"0.88rem"}}>
              <p>📍 <strong>{LUGARES[r.origin]}</strong> → <strong>{LUGARES[r.destination]}</strong></p>
              <p style={{marginTop:4,color:"#6B6B6B"}}>📅 {fmtDate(r.date)} · {r.time}h</p>
              {r.flightNumber&&<p style={{marginTop:4,color:"#B8845A"}}>✈ Vuelo: {r.flightNumber}</p>}
              {r.pagoMetodo&&<p style={{marginTop:4,color:"#6B6B6B"}}>💳 Pago: {r.pagoMetodo}</p>}
              {r.reciboVia&&<p style={{marginTop:4,color:"#6B6B6B"}}>📬 Recibo vía: {r.reciboVia}</p>}
              {r.notes&&<p style={{marginTop:4,color:"#888",fontStyle:"italic"}}>💬 "{r.notes}"</p>}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:"1.4rem"}}>{fmtPrice(r.price)}</span>
              <button onClick={()=>setReciboActivo(r)}
                style={{background:"#F0EDE8",color:"#0C0C0C",padding:"8px 14px",borderRadius:100,fontSize:"0.78rem",fontWeight:500}}>
                🧾 Ver recibo
              </button>
            </div>
            {r.status==="pending"&&(
              <div style={{display:"flex",gap:8,borderTop:"1px solid rgba(0,0,0,0.06)",paddingTop:12}}>
                <a href={waConfirm(r)} target="_blank" onClick={()=>onUpdate(r.id,"confirmed")}
                  style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:"#25D366",color:"white",padding:"12px",borderRadius:10,fontSize:"0.85rem",fontWeight:500}}>
                  <WAIcon size={14}/> Confirmar
                </a>
                <a href={waReject(r)} target="_blank" onClick={()=>onUpdate(r.id,"rejected")}
                  style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:"#FEE2E2",color:"#991B1B",padding:"12px",borderRadius:10,fontSize:"0.85rem",fontWeight:500}}>
                  Rechazar
                </a>
              </div>
            )}
            {r.status==="confirmed"&&(
              <a href={waConfirm(r)} target="_blank"
                style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:"rgba(37,211,102,0.1)",color:"#065F46",padding:"10px",borderRadius:10,fontSize:"0.82rem",fontWeight:500,marginTop:4}}>
                <WAIcon size={13}/> Reenviar confirmación
              </a>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]     = useState("landing");
  const [user,setUser]     = useState(null);
  const [isAdmin,setAdmin] = useState(false);
  const [reservas,setRes]  = useState([]);
  const [prefill,setPrefill] = useState(null);

  useEffect(()=>{
    const link=document.createElement("link");
    link.rel="stylesheet";
    link.href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap";
    document.head.appendChild(link);
  },[]);

  // Load reservations from Supabase when admin logs in
  async function loadReservas(){
    const {data} = await supabase.from('reservas').select('*').order('created_at',{ascending:false});
    if(data) {
      const mapped = data.map(r=>({
        id: r.id, name: r.name, phone: r.phone,
        origin: r.origin, destination: r.destination,
        date: r.date, time: r.time,
        flightNumber: r.flight_number, notes: r.notes,
        tipoViaje: r.tipo_viaje, price: r.price,
        pagoMetodo: r.pago_metodo, reciboVia: r.recibo_via,
        status: r.status, userId: r.user_id,
        createdAt: r.created_at
      }));
      setRes(mapped);
    }
  }

  function handleLogin(u,admin){
    if(admin){setAdmin(true);loadReservas();setView("admin");return;}
    setUser(u);
    setView(prefill?"reserve":"dashboard");
  }

  function handleReservar(data){
    setPrefill(data);
    setView(user?"reserve":"auth");
  }

  function handleReservaSubmit(r){
    setRes(prev=>[r,...prev]);
    setPrefill(null);
  }

  async function handleUpdateStatus(id,status){
    await supabase.from('reservas').update({status}).eq('id',id);
    setRes(p=>p.map(r=>r.id===id?{...r,status}:r));
  }

  function handleLogout(){setUser(null);setAdmin(false);setView("landing");}

  if(view==="landing") return <Landing user={user} onLogin={()=>setView("auth")} onReservar={handleReservar}/>;
  if(view==="auth")    return <Auth onLogin={handleLogin} onBack={()=>setView("landing")} onGuest={()=>setView("reserve")}/>;
  if(view==="reserve") return <ReservaForm user={user} prefill={prefill} onSubmit={handleReservaSubmit} onBack={()=>setView(user?"dashboard":"landing")}/>;
  if(view==="dashboard"&&user) return <Dashboard user={user} reservas={reservas} onNuevaReserva={()=>{setPrefill(null);setView("reserve");}} onLogout={handleLogout}/>;
  if(view==="admin"&&isAdmin) return <Admin reservas={reservas} onUpdate={handleUpdateStatus} onLogout={handleLogout} onLanding={()=>setView("landing")}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
